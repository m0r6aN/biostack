services:
  postgres:
    image: postgres:17-alpine
    container_name: biostack-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=biostack
      - POSTGRES_USER=biostack
      - POSTGRES_PASSWORD=${DB_PASSWORD:-biostack_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biostack -d biostack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  biostack-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biostack-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Database__Provider=postgres
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=biostack;Username=biostack;Password=${DB_PASSWORD:-biostack_dev_password}
      - Jwt__Secret=${Jwt__Secret:-CHANGE_ME_MINIMUM_32_CHARACTER_RANDOM_STRING}
      - Auth__CallbackSecret=${Auth__CallbackSecret:-CHANGE_ME_SHARED_SECRET}
      - PublicApiUrl=${PublicApiUrl:-http://localhost:5000}
      - FrontendUrl=${FrontendUrl:-http://localhost:3043}
      - Smtp__Host=${Smtp__Host:-}
      - Smtp__Port=${Smtp__Port:-587}
      - Smtp__EnableSsl=${Smtp__EnableSsl:-true}
      - Smtp__Username=${Smtp__Username:-}
      - Smtp__Password=${Smtp__Password:-}
      - Smtp__FromEmail=${Smtp__FromEmail:-}
      - Smtp__FromName=${Smtp__FromName:-BioStack}
      - Smtp__MagicLinkSubject=${Smtp__MagicLinkSubject:-Your BioStack sign-in link}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  biostack-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: biostack-ui
    ports:
      - "3043:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-http://biostack-api:5000}
      - AUTH_SECRET=${AUTH_SECRET:-CHANGE_ME_NEXTAUTH_SECRET_MIN_32_CHARS}
      - AUTH_URL=${AUTH_URL:-http://localhost:3043}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - AUTH_CALLBACK_SECRET=${AUTH_CALLBACK_SECRET:-CHANGE_ME_SHARED_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID:-}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_CLIENT_SECRET=${APPLE_CLIENT_SECRET:-}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID:-}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET:-}
      - INSTAGRAM_CLIENT_ID=${INSTAGRAM_CLIENT_ID:-}
      - INSTAGRAM_CLIENT_SECRET=${INSTAGRAM_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      biostack-api:
        condition: service_healthy
    restart: unless-stopped

  # One-shot ingestion job. Runs once per `docker compose run` (or per Azure
  # Container App Job invocation in production) and exits. `restart: "no"`
  # keeps compose from treating its clean exit as a crash and looping forever.
  biostack-knowledge-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.knowledge-worker
    container_name: biostack-knowledge-worker
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=biostack;Username=biostack;Password=${DB_PASSWORD:-biostack_dev_password}
      - Worker__RunMode=${Worker__RunMode:-Seed}
      - Worker__DryRun=${Worker__DryRun:-false}
      - Worker__MaxBatchSize=${Worker__MaxBatchSize:-50}
      - Worker__SeedFilePath=/app/Seeds/substances-seed.json
      - Worker__TrustThresholds__ClassA=${Worker__TrustThresholds__ClassA:-0.70}
      - Worker__TrustThresholds__ClassB=${Worker__TrustThresholds__ClassB:-0.85}
      - Worker__LogLevel=${Worker__LogLevel:-Information}
      - Worker__ScopeHint=${Worker__ScopeHint:-}
    depends_on:
      biostack-api:
        condition: service_healthy
    restart: "no"

volumes:
  postgres-data:
    driver: local
