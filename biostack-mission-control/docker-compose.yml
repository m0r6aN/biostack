version: "3.8"

services:
  biostack-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biostack-api
    ports:
      - "5000:5000"
    volumes:
      - biostack-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/biostack.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  biostack-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    container_name: biostack-ui
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://biostack-api:5000
    depends_on:
      biostack-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  biostack-data:
    driver: local
