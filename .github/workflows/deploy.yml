name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC login
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check authoritative product contract
        run: node scripts/sync-product-contract.mjs --check

      # ── Backend tests ──────────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run backend tests
        working-directory: backend
        run: dotnet test --verbosity minimal

      # ── Frontend tests ─────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Audit production frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=moderate

      - name: Run frontend tests
        working-directory: frontend
        # Bound worker concurrency so the launch suite fits reliably on the
        # hosted runner instead of exhausting the Node heap before deployment.
        run: npm test -- --pool=threads --maxWorkers=2 --no-file-parallelism

      - name: Build production frontend
        working-directory: frontend
        run: npm run build

      # ── Azure login via OIDC (no long-lived secrets) ───────────────────────
      - name: Azure login
        if: github.event_name != 'pull_request'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Authenticate Docker to ACR ─────────────────────────────────────────
      - name: Log in to ACR
        if: github.event_name != 'pull_request'
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # ── Build & push API image ─────────────────────────────────────────────
      - name: Build & push API
        if: github.event_name != 'pull_request'
        working-directory: backend
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/biostack-api
          docker build \
            --file Dockerfile \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ── Build & push frontend image ────────────────────────────────────────
      - name: Build & push frontend
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/biostack-web
          docker build \
            --file Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --tag $IMAGE:${{ github.sha }} \
            --tag $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # ── Update container apps to new images ────────────────────────────────
      - name: Update API container app
        if: github.event_name != 'pull_request'
        run: |
          az containerapp update \
            --name ${{ secrets.API_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/biostack-api:${{ github.sha }}

      - name: Update frontend container app
        if: github.event_name != 'pull_request'
        run: |
          az containerapp update \
            --name ${{ secrets.WEB_APP_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/biostack-web:${{ github.sha }}
