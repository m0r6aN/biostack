name: Protocol Operations Offline Verification Kit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  protocol-operations-offline-verification-kit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Run offline verification kit guard
        run: pwsh ./backend/tools/BioStack.ProtocolOperationsExportBundleVerifierCli/verify-offline-kit.ps1

      - name: Check PR diff whitespace
        run: |
          git fetch origin main
          git diff --check origin/main...HEAD
